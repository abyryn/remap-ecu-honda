; ============================================================
; platformio.ini - Honda ECU K-Line Diagnostic Tool
; Board : ESP32 DOIT DevKit V1
; Framework : Arduino
; ============================================================

[env:esp32doit-devkit-v1]
platform  = espressif32
board     = esp32doit-devkit-v1
framework = arduino

; --- Build ---
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DBOARD_HAS_PSRAM=0
    -std=gnu++17

; --- Serial Monitor ---
monitor_speed  = 115200
monitor_filters = esp32_exception_decoder

; --- Upload ---
upload_speed   = 921600
upload_port    = COM3   ; Ganti sesuai port kamu

; --- Source files ---
src_dir        = firmware
include_dirs   = firmware/include

; --- LittleFS (web files) ---
board_build.filesystem        = littlefs
board_build.partitions        = default_8MB.csv

; Extra scripts for LittleFS upload
extra_scripts  = pre:scripts/copy_web.py

; ============================================================
; Libraries (pinned version untuk stabilitas)
; ============================================================
lib_deps =
    ; Async Web Server
    https://github.com/me-no-dev/ESPAsyncWebServer.git
    https://github.com/me-no-dev/AsyncTCP.git

    ; JSON
    bblanchon/ArduinoJson @ ^7.0.4

    ; LittleFS sudah built-in di ESP32 Arduino Core >= 2.0

; ============================================================
; OTA
; ============================================================
upload_protocol = espota
; upload_port   = honda-ecu.local   ; uncomment untuk OTA via mDNS
; upload_flags  =
;     --port=3232
;     --auth=admin123
